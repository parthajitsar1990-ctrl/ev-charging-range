<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Smart Planner</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#22c55e;
  --text:#e2e8f0;
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

.card {
  background:var(--card);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

.resultBox {
  background:#020617;
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-top:10px;
}

.big { font-size:22px; color:var(--accent); }

.timeline {
  border-left:2px solid #334155;
  padding-left:10px;
}

.event {
  background:#020617;
  padding:8px;
  margin-bottom:6px;
  border-radius:8px;
}

.socBar { height:10px; background:#1e293b; border-radius:10px; }
.socFill { height:100%; background:#22c55e; width:0%; }
</style>
</head>

<body>

<h2>⚡ EV Smart Planner</h2>

<div class="card">
<h3>Driving Conditions</h3>

<select id="speed">
<option value="50">City</option>
<option value="70" selected>Mixed</option>
<option value="90">Highway</option>
<option value="110">Fast</option>
</select>

<select id="ac">
<option value="off">AC Off</option>
<option value="normal" selected>AC Normal</option>
<option value="heavy">AC Heavy</option>
</select>

<select id="terrain">
<option value="flat">Flat</option>
<option value="mild">Mild</option>
<option value="hilly">Hilly</option>
</select>
</div>

<div class="card">
<h3>Trip</h3>

<input type="number" id="tripDist" value="400">

<input type="range" id="startSoc" min="50" max="100" value="90">
<div id="startSocVal"></div>

<div class="socBar"><div id="socFill" class="socFill"></div></div>

<select id="charger">
<option value="7">7 kW (Home)</option>
<option value="15">15 kW</option>
<option value="30" selected>30 kW</option>
<option value="50">50 kW</option>
</select>

<select id="mode">
<option value="fast">Fastest Route</option>
<option value="cheap">Cheapest Route</option>
</select>

<div class="resultBox"><div class="big" id="stops"></div>Stops</div>
<div class="resultBox"><div class="big" id="chargeTime"></div>Charging Time</div>
<div class="resultBox"><div class="big" id="driveTime"></div>Driving Time</div>
<div class="resultBox"><div class="big" id="totalTime"></div>Total Time</div>
<div class="resultBox"><div class="big" id="eta"></div>ETA</div>

<div class="timeline" id="timeline"></div>

</div>

<script>

let battery = 42;

function getAEC(){
let base=150;
let f=1;

if(speed.value>=100) f*=1.25;
else if(speed.value>=80) f*=1.15;

if(ac.value==="heavy") f*=1.15;
if(ac.value==="normal") f*=1.05;

if(terrain.value==="hilly") f*=1.2;
if(terrain.value==="mild") f*=1.1;

return base*f;
}

function format(min){
let h=Math.floor(min/60);
let m=Math.round(min%60);
return h+"h "+m+"m";
}

function plan(){

let dist=+tripDist.value;
let start=+startSoc.value;
let speedVal=+speed.value;
let chargerPower=+charger.value;
let modeVal=mode.value;

startSocVal.innerText=start+"%";
socFill.style.width=start+"%";

let aec=getAEC();
let fullRange=battery/(aec/1000);

// STRATEGY
let chargeCap=0.7;
let chargeSpeed=chargerPower;

if(modeVal==="fast"){
chargeCap=0.8;
chargeSpeed=Math.max(chargerPower,30);
}
if(modeVal==="cheap"){
chargeCap=0.6;
chargeSpeed=Math.min(chargerPower,15);
}

let usable=fullRange*(start/100);
let remain=dist;

let stops=0;
let chargeTimeTotal=0;
let driveTimeTotal=0;
let cumulative=0;

timeline.innerHTML="";

function add(t){
let d=document.createElement("div");
d.className="event";
d.innerText=t;
timeline.appendChild(d);
}

add("Start (0h)");

while(remain>usable){

// drive
let drive=(usable/speedVal)*60;
driveTimeTotal+=drive;
cumulative+=drive;

add("Drive "+Math.round(usable)+" km • "+format(cumulative));

remain-=usable;
stops++;

// charge
let energy=battery*chargeCap;
let chargeTime=(energy/chargeSpeed)*60;

chargeTimeTotal+=chargeTime;
cumulative+=chargeTime;

add("Charge • "+format(cumulative));

usable=fullRange*chargeCap;
}

// final leg
let finalDrive=(remain/speedVal)*60;
driveTimeTotal+=finalDrive;
cumulative+=finalDrive;

add("Final "+Math.round(remain)+" km • "+format(cumulative));
add("Arrive • "+format(cumulative));

// totals
let total=driveTimeTotal+chargeTimeTotal;

let etaDate=new Date(Date.now()+total*60000);
let etaStr=etaDate.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

// outputs
stopsEl.innerText=stops;
chargeTime.innerText=Math.round(chargeTimeTotal)+" min";
driveTime.innerText=Math.round(driveTimeTotal)+" min";
totalTime.innerText=Math.round(total)+" min";
eta.innerText=etaStr;

}

document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",plan);
});

let stopsEl=document.getElementById("stops");

plan();

</script>

</body>
</html>
